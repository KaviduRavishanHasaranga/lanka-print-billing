# ============================================================
# Nginx Reverse Proxy Config — Lanka Print Billing System
# ============================================================
# Instructions:
#   1. Copy this file to /etc/nginx/sites-available/billing-system
#   2. Replace 'your-domain.com' with your actual domain or VPS IP
#   3. Run: ln -s /etc/nginx/sites-available/billing-system /etc/nginx/sites-enabled/
#   4. Run: nginx -t && systemctl reload nginx
#   5. (Optional) Get free SSL: certbot --nginx -d your-domain.com
# ============================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # Replace above with your domain name, or just your VPS IP if no domain:
    # server_name 123.456.789.000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size limit (for file uploads)
    client_max_body_size 20M;

    # Proxy all traffic to Node.js / Express on port 5000
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass real client info to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}

